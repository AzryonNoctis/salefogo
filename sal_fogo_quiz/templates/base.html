<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Sal & Fogo Quiz{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="salt-layer" aria-hidden="true">
    <span class="salt s1">🧂</span>
    <span class="salt s2">·</span>
    <span class="salt s3">🧂</span>
    <span class="salt s4">•</span>
    <span class="salt s5">✦</span>
    <span class="salt s6">🧂</span>
    <span class="salt s7">·</span>
    <span class="salt s8">•</span>
    <span class="salt s9">🧂</span>
  </div>
  <div class="spark-layer" aria-hidden="true">
    <span class="spark f1">🔥</span>
    <span class="spark f2">✦</span>
    <span class="spark f3">🔥</span>
    <span class="spark f4">✧</span>
    <span class="spark f5">🔥</span>
    <span class="spark f6">✦</span>
    <span class="spark f7">🔥</span>
  </div>

  {% block floating_icons %}{% endblock %}

  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
